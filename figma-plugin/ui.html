<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Segoe UI", sans-serif; }
  body { background: #fff; color: #1a1a1a; padding: 16px; font-size: 12px; }
  .empty { color: #999; text-align: center; padding: 60px 20px; line-height: 1.6; }
  .swatch { width: 100%; height: 80px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 12px; }
  h2 { font-size: 16px; margin-bottom: 2px; }
  .cf-id { font-family: "SF Mono", Monaco, monospace; font-size: 11px; color: #4a90e2; margin-bottom: 12px; word-break: break-all; }
  .cf-id a { color: #4a90e2; text-decoration: none; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 11px; }
  .row:last-child { border-bottom: none; }
  .label { color: #888; }
  .value { font-family: "SF Mono", Monaco, monospace; }
  .section { margin-top: 14px; }
  .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #999; margin-bottom: 6px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; border: 1px solid #ddd; color: #666; margin-right: 4px; }
  .badge.pass { border-color: #b7e4b7; color: #2e7d32; background: #f1f8f1; }
  .badge.fail { border-color: #f3c2c2; color: #c62828; background: #fdf1f1; }
  .source { font-size: 10px; color: #aaa; margin-bottom: 8px; }
  .copy-btn {
    width: 100%; margin-top: 12px; padding: 8px; border-radius: 6px;
    border: 1px solid #ddd; background: #fafafa; cursor: pointer; font-size: 11px;
  }
  .copy-btn:hover { background: #f0f0f0; }
  .copy-btn.copied { background: #e8f5e9; border-color: #b7e4b7; color: #2e7d32; }
  .footer { margin-top: 16px; text-align: center; font-size: 10px; color: #ccc; }
  .footer a { color: #ccc; }
</style>
</head>
<body>

<div id="empty" class="empty">
  Select a shape with a solid fill<br>to see its CF Colour ID.
</div>

<div id="content" style="display:none">
  <div class="swatch" id="swatch"></div>
  <div class="source" id="source"></div>
  <h2 id="name"></h2>
  <div class="cf-id" id="cfid"></div>

  <div class="section">
    <div class="section-title">Identity</div>
    <div class="row"><span class="label">hex</span><span class="value" id="hex"></span></div>
    <div class="row"><span class="label">rgb</span><span class="value" id="rgb"></span></div>
  </div>

  <div class="section">
    <div class="section-title">LCH</div>
    <div class="row"><span class="label">L</span><span class="value" id="lch-l"></span></div>
    <div class="row"><span class="label">C</span><span class="value" id="lch-c"></span></div>
    <div class="row"><span class="label">H</span><span class="value" id="lch-h"></span></div>
  </div>

  <div class="section">
    <div class="section-title">Contrast on White / Black</div>
    <div id="contrast-badges"></div>
  </div>

  <button class="copy-btn" id="copy-btn">Copy CF-ID</button>
</div>

<div class="footer">
  <a href="https://github.com/mauludsadiq/Colour-in-Fard" target="_blank">CF Colour Protocol v1.0.0</a>
</div>

<script>
const REGISTRY_BASE = "https://mauludsadiq.github.io/Colour-in-Fard/registry";

// --- sRGB helpers ---
function hexToRgb(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function srgbToLinear(c) {
  c /= 255;
  return c <= 0.04045 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
}

// --- CIELAB ---
function rgbToLab(r,g,b) {
  const r1=srgbToLinear(r), g1=srgbToLinear(g), b1=srgbToLinear(b);
  const x=(r1*0.4124564+g1*0.3575761+b1*0.1804375)*100/95.047;
  const y=(r1*0.2126729+g1*0.7151522+b1*0.0721750)*100/100;
  const z=(r1*0.0193339+g1*0.1191920+b1*0.9503041)*100/108.883;
  const f=v=>v>0.008856?Math.pow(v,1/3):7.787*v+16/116;
  const L=116*f(y)-16, a=500*(f(x)-f(y)), bv=200*(f(y)-f(z));
  const C=Math.sqrt(a*a+bv*bv);
  let H=Math.atan2(bv,a)*180/Math.PI; if(H<0)H+=360;
  return {L, a, b: bv, C, H};
}

// --- CF-ID (matches SPEC.md exactly) ---
function round3(v) {
  // FARD round3: trunc(x*1000+0.5)/1000 (truncation toward zero)
  const scaled = v * 1000.0 + 0.5;
  const truncated = scaled >= 0 ? Math.floor(scaled) : Math.ceil(scaled);
  return truncated / 1000.0;
}
function jsonNumber(v) {
  const r = round3(v);
  if (Number.isInteger(r)) return String(r);
  // strip trailing zeros
  let s = r.toFixed(3).replace(/0+$/,'').replace(/\.$/,'');
  return s;
}
async function sha256Hex(str) {
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function computeCfId(hex) {
  const [r,g,b] = hexToRgb(hex);
  const lab = rgbToLab(r,g,b);
  const a_s = jsonNumber(lab.a);
  const b_s = jsonNumber(lab.b);
  const l_s = jsonNumber(lab.L);
  const preimage = '{"a":' + a_s + ',"b":' + b_s + ',"l":' + l_s + '}';
  const hexdigest = await sha256Hex(preimage);
  const labhash8 = hexdigest.slice(0,8).toUpperCase();
  const hex6 = hex.replace('#','').toUpperCase();
  return { cfId: 'CF-' + hex6 + '-' + labhash8, lab, rgb: [r,g,b] };
}

// --- WCAG contrast ---
function relLum(r,g,b) {
  return 0.2126*srgbToLinear(r) + 0.7152*srgbToLinear(g) + 0.0722*srgbToLinear(b);
}
function contrastRatio(rgb1, rgb2_lum) {
  const l1 = relLum(...rgb1);
  const lighter = Math.max(l1, rgb2_lum), darker = Math.min(l1, rgb2_lum);
  return (lighter+0.05)/(darker+0.05);
}

async function fetchRegistryEntry(hex, rgb) {
  const r2 = hex.replace('#','').slice(0,2).toLowerCase();
  try {
    const res = await fetch(`${REGISTRY_BASE}/shards/${r2}.ndjson`);
    if (!res.ok) return null;
    const text = await res.text();
    for (const line of text.trim().split('\n')) {
      try {
        const obj = JSON.parse(line);
        if (obj.hex === hex.toLowerCase()) return obj;
      } catch(e) {}
    }
  } catch(e) {}
  return null;
}

let currentCfId = null;

async function render(data) {
  document.getElementById('empty').style.display = 'none';
  document.getElementById('content').style.display = 'block';

  const hex = data.hex.toLowerCase();
  const { cfId, lab, rgb } = await computeCfId(hex);
  currentCfId = cfId;

  document.getElementById('swatch').style.background = hex;
  document.getElementById('source').textContent = `${data.nodeName}  ·  ${data.source}`;

  const entry = await fetchRegistryEntry(hex, rgb);
  document.getElementById('name').textContent = entry ? entry.nearest_name : '(name lookup unavailable)';

  const cfidUrl = `${REGISTRY_BASE}/by-id/${cfId}.json`;
  document.getElementById('cfid').innerHTML =
    entry ? `<a href="${cfidUrl}" target="_blank">${cfId}</a>` : cfId;

  document.getElementById('hex').textContent = hex;
  document.getElementById('rgb').textContent = rgb.join(', ');
  document.getElementById('lch-l').textContent = lab.L.toFixed(2);
  document.getElementById('lch-c').textContent = lab.C.toFixed(2);
  document.getElementById('lch-h').textContent = lab.H.toFixed(2);

  const ratioWhite = contrastRatio(rgb, 1.0);
  const ratioBlack = contrastRatio(rgb, 0.0);
  const badge = (label, ratio) => {
    const aa = ratio >= 4.5;
    return `<span class="badge ${aa?'pass':'fail'}">${label} ${ratio.toFixed(2)}:1 ${aa?'AA':'fail'}</span>`;
  };
  document.getElementById('contrast-badges').innerHTML =
    badge('white', ratioWhite) + badge('black', ratioBlack);
}

window.onmessage = (event) => {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'colour') {
    render(msg);
  } else if (msg.type === 'no-colour') {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('content').style.display = 'none';
  }
};

document.getElementById('copy-btn').addEventListener('click', () => {
  if (!currentCfId) return;
  navigator.clipboard.writeText(currentCfId).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy CF-ID';
      btn.classList.remove('copied');
    }, 1200);
  });
});
</script>

</body>
</html>
